services:
  - type: web
    name: htmltoimg-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: JSON_LIMIT
        value: 50mb
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
      - key: BLOCK_REMOTE_FONTS
        value: false
      - key: ASSET_CACHE_TTL_MS
        value: 300000
      - key: ASSET_CACHE_MAX_BYTES
        value: 12582912
      - key: ASSET_CACHE_MAX_ITEMS
        value: 80
      - key: ASSET_CACHE_MAX_ENTRY_BYTES
        value: 1048576
      - key: REMOTE_FETCH_TIMEOUT_MS
        value: 6000
